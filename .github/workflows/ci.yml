name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Parked-project rot canary: a monthly run surfaces dependency, Python, or
    # runner drift (pip-audit CVEs especially) as a failed-run email instead
    # of a re-entry surprise.
    - cron: "43 6 3 * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Gate the full range: dev venv is 3.12, the lab host runs 3.14
        # (Python 3.14.6 on Windows). The project was already bitten by a
        # 3.14-only breakage (requests-negotiate-sspi, which forced the
        # pyspnego rewrite) — 3.14 in CI catches the next one. The Windows
        # SSPI enrollment dep (pyspnego) is platform-gated and not installed
        # on Linux; the one test that needs SHA1 signing skips
        # (436 pass / 1 skip).
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Create venv and install
        # setup-uv@v8 no longer auto-creates a project venv — create it
        # explicitly so the tool steps below can invoke via `.venv/bin/...`.
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: .venv/bin/ruff check .

      - name: Mypy typecheck (strict)
        run: .venv/bin/mypy src

      - name: Run tests
        run: .venv/bin/pytest -q

  windows-import-check:
    # The production platform is Windows (Python 3.14, IIS, gMSA). pyspnego
    # is platform-gated (sys_platform == 'win32') and never installed on
    # Linux, so the real auth path's imports are only exercised here. This
    # job is the CI counterpart to the lab re-proof's import verification
    # step (install-windows.ps1 step 4).
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Create venv and install
        shell: pwsh
        run: |
          uv venv --python 3.14
          uv pip install -e ".[dev]"

      - name: Verify win32-gated imports resolve
        # pyspnego + sspilib install on win32; negotiate_auth and the real
        # enrollment/revocation legs import them. This is the only CI surface
        # that catches a win32-only import breakage before it reaches the lab.
        shell: pwsh
        run: |
          .venv\Scripts\python.exe -c "import spnego; import acme_adcs_ra.negotiate_auth; print('negotiate_auth: OK')"
          .venv\Scripts\python.exe -c "from acme_adcs_ra.enrollment import CertsrvEnrollmentLeg; print('CertsrvEnrollmentLeg: OK')"
          .venv\Scripts\python.exe -c "from acme_adcs_ra.revocation import CertsrvRevocationLeg; print('CertsrvRevocationLeg: OK')"

      - name: Run tests
        shell: pwsh
        run: .venv\Scripts\python.exe -m pytest -q

  identifier-gate:
    # Mechanical gate against committing work-domain identifiers (the AGENTS.md
    # hard rule). No-op until the repository secret ACME_RA_FORBIDDEN_IDENTIFIERS
    # is configured; the script exits 0 when the env var is unset.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Check for committed work-domain identifiers
        env:
          ACME_RA_FORBIDDEN_IDENTIFIERS: ${{ secrets.ACME_RA_FORBIDDEN_IDENTIFIERS }}
        run: python scripts/check_committed_identifiers.py

  pip-audit:
    # This is issuance-path infrastructure: audit the third-party dependency
    # closure for known CVEs. Mirrors cert-watch's security posture.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Audit dependency closure
        # Snapshot the closure before installing pip-audit (so the audit tool's
        # own deps aren't included) and drop the editable acme-adcs-ra line —
        # it's an unpublished editable install that --strict would fail on
        # ("not found on PyPI").
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip freeze | grep -v 'acme-adcs-ra' > /tmp/audit-reqs.txt
          uv pip install pip-audit
          .venv/bin/pip-audit --strict --requirement /tmp/audit-reqs.txt
